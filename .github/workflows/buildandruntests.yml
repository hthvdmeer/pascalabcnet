name: Build (pabcnetc, .NET 10, Windows)

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build command-line compiler on Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build pabcnetc.sln
      run: dotnet build pabcnetc.sln -c Release -v q
